name: Java CI with Maven

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw
      
      - name: Build project
        run: ./mvnw -B clean package -DskipTests

  tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw

      # LINHA CORRIGIDA AQUI: Mudamos de "test" para "verify" para incluir a integração e o JaCoCo!
      - name: Run unit and integration tests
        run: ./mvnw -B verify
