version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: mysql_teste_deploy
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "mateus"
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: adminer_teste_deploy
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  mysql_data:
