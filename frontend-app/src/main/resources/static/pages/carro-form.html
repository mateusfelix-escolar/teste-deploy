<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo carro - LojaCarro</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/app.js"></script>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <a class="link" href="/pages/carros.html">← Voltar para carros</a>
      <div class="pill" id="userBadge">Carregando...</div>
    </div>

    <div class="form-card">
      <h2 id="formTitle">Novo carro</h2>
      <div id="status" class="status">Preencha os dados do carro.</div>
      <form onsubmit="saveCarro(event)">
        <input id="carroId" type="hidden" />
        <div class="form-grid">
          <div>
            <label for="modelo">Modelo</label>
            <input id="modelo" name="modelo" required />
          </div>
          <div>
            <label for="ano">Ano</label>
            <input id="ano" name="ano" type="number" min="1900" max="2100" required />
          </div>
          <div>
            <label for="preco">Preço</label>
            <input id="preco" name="preco" type="number" step="0.01" min="0" required />
          </div>
          <button class="btn btn-primary" type="submit">Salvar carro</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
